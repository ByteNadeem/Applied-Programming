<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maths Game</title>

    <!-- CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

    <div class="container">

        <h1>Maths Game</h1>

        <!-- Operation Buttons -->
        <div class="operation-buttons">
            <button onclick="startGame('addition')">Addition</button>
            <button onclick="startGame('subtract')">Subtraction</button>
            <button onclick="startGame('multiply')">Multiplication</button>
            <button onclick="startGame('division')">Division</button>
            <button onclick="startGame('modulus')">Modulus</button>
        </div>

        <!-- Question Display -->
        <div id="question-box" class="question-box hidden">
            <span id="operand1"></span>
            <span id="operator"></span>
            <span id="operand2"></span>
            <span>=</span>
            <input id="answer-box" type="number" autocomplete="off">
            <button id="submit-btn" onclick="checkAnswer()">Submit</button>
        </div>

        <!-- Progress Bar -->
        <div class="progress-container hidden" id="progress-container">
            <div class="progress-bar" id="progress-bar"></div>
        </div>

        <!-- Round Complete Message -->
        <div id="round-complete" class="round-complete hidden">
            🎉 Round Complete! 🎉
        </div>

    </div>

    <!-- Confetti Library -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <!-- Main Script -->
    <script src="{{ url_for('static', filename='js/script.js') }}"></script>

</body>
</html>
