<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maths Game</title>

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <!-- CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

    <div class="container">

        <!-- Love Maths Logo -->
        <img src="{{ url_for('static', filename='images/love-maths-logo.png') }}"
             alt="Love Maths Logo"
             class="logo">

        <h1>Maths Game</h1>

        <!-- Operation Buttons -->
        <div class="operation-buttons">

            <button class="op-btn addition" onclick="startGame('addition')">
                <i class="fa-solid fa-plus"></i> Addition
            </button>

            <button class="op-btn subtraction" onclick="startGame('subtract')">
                <i class="fa-solid fa-minus"></i> Subtraction
            </button>

            <button class="op-btn multiplication" onclick="startGame('multiply')">
                <i class="fa-solid fa-xmark"></i> Multiplication
            </button>

            <button class="op-btn division" onclick="startGame('division')">
                <i class="fa-solid fa-divide"></i> Division
            </button>

            <button class="op-btn modulus" onclick="startGame('modulus')">
                <i class="fa-solid fa-percent"></i> Modulus
            </button>

        </div>

        <!-- Scoreboard -->
        <div id="scoreboard" class="scoreboard hidden">
            <span>Correct: <span id="correct-score">0</span></span>
            <span>Incorrect: <span id="incorrect-score">0</span></span>
        </div>

        <!-- Question Display -->
        <div id="question-box" class="question-box hidden">
            <span id="operand1"></span>
            <span id="operator"></span>
            <span id="operand2"></span>
            <span>=</span>

            <input id="answer-box" type="number" autocomplete="off">

            <button id="submit-btn" onclick="checkAnswer()">Submit</button>
            <button id="next-btn" class="hidden" onclick="nextQuestion()">Next Question</button>
        </div>

        <!-- Progress Bar -->
        <div class="progress-container hidden" id="progress-container">
            <div class="progress-bar" id="progress-bar"></div>
        </div>

        <!-- Round Complete Message -->
        <div id="round-complete" class="round-complete hidden">
            🎉 Round Complete! 🎉
        </div>

    </div>

    <!-- Confetti Library -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <!-- Main Script -->
    <script src="{{ url_for('static', filename='js/script.js') }}"></script>

</body>
</html>
